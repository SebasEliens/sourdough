# See https://pre-commit.com for more information
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-check
        args: ["--config", "apps/api/pyproject.toml"]
        files: ^apps/api/
      - id: ruff-format
        args: ["--config", "apps/api/pyproject.toml"]
        files: ^apps/api/

  # Use project's Prettier (mirrors-prettier is archived and lacks v3.x tags)
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npm exec -w @sourdough/web prettier -- --write
        language: system
        files: ^apps/web/.*\.(ts|tsx|css|json)$
